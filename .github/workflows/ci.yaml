name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# kacho-compute собирается из своего репо; зависимости (kacho-corelib, kacho-iam,
# kacho-geo, kacho-vpc) — versioned-модули с GitHub (go.mod без replace), поэтому
# siblings checkout не нужен.

defaults:
  run:
    working-directory: kacho-compute

jobs:
  build-vet-test:
    name: build + vet + test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { path: kacho-compute }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-compute/go.mod, cache-dependency-path: kacho-compute/go.sum }
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -short -count=1 -timeout 5m ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { path: kacho-compute }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-compute/go.mod, cache-dependency-path: kacho-compute/go.sum }
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: kacho-compute
          args: --timeout 5m

  govuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { path: kacho-compute }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-compute/go.mod, cache-dependency-path: kacho-compute/go.sum }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
        continue-on-error: true

  integration:
    name: integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { path: kacho-compute }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-compute/go.mod, cache-dependency-path: kacho-compute/go.sum }
      - run: go mod download
      - run: go test ./internal/repo/... -race -count=1 -timeout 300s

  authz-deny-suite:
    name: authz-deny suite — generate + validate (KAC-122)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { path: kacho-compute }
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: generate authz-deny collection
        run: python3 tests/newman/scripts/gen.py authz-deny
      - name: assert collection non-empty
        run: |
          test -s tests/newman/collections/authz-deny.postman_collection.json
          n=$(python3 -c "import json; print(len(json.load(open('tests/newman/collections/authz-deny.postman_collection.json'))['item']))")
          echo "authz-deny cases: $n"
          test "$n" -ge 180
      - uses: actions/upload-artifact@v7
        with:
          name: authz-deny-collection
          path: kacho-compute/tests/newman/collections/authz-deny.postman_collection.json
