syntax = "proto3";

package kacho.cloud.compute.v1;

option go_package = "github.com/PRO-Robotech/kacho-compute/proto/gen/go/kacho/cloud/compute/v1;computev1";

enum MaintenancePolicy {
  MAINTENANCE_POLICY_UNSPECIFIED = 0;
  // Restart instance to move it to another host during maintenance
  RESTART = 1;
  // Use live migration to move instance to another host during maintenance
  MIGRATE = 2;
}
