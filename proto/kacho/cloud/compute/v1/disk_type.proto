syntax = "proto3";

package kacho.cloud.compute.v1;

option go_package = "github.com/PRO-Robotech/kacho-compute/proto/gen/go/kacho/cloud/compute/v1;computev1";

message DiskType {
  // ID of the disk type.
  string id = 1;

  // Description of the disk type. 0-256 characters long.
  string description = 2;

  // Array of availability zones where the disk type is available.
  repeated string zone_ids = 3;
}
