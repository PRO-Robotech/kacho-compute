syntax = "proto3";

package kacho.cloud.compute.v1;

import "google/api/annotations.proto";
import "kacho/cloud/compute/v1/disk_type.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho-compute/proto/gen/go/kacho/cloud/compute/v1;computev1";

// InternalDiskTypeService — kacho-only admin API для управления read-only
// справочником DiskType. Exposed только на cluster-internal порту kacho-compute
// (9091); проброшен через api-gateway internal mux на /compute/v1/diskTypes —
// НЕ на external TLS endpoint (см. workspace CLAUDE.md §запрет 6).
//
// Geography (Region/Zone) — домен kacho-geo (geo.v1). Перенесено из compute.v1
// (epic kacho-geo S7); compute.v1 Region/Zone + Internal{Region,Zone}Service
// удалены здесь после переключения всех consumer'ов на geo.v1.

service InternalDiskTypeService {
  rpc Create (CreateDiskTypeRequest) returns (DiskType) {
    option (google.api.http) = { post: "/compute/v1/diskTypes" body: "*" };
    option (kacho.iam.authz.v1.permission)        = "compute.disk_types.create";
    option (kacho.iam.authz.v1.required_relation) = "system_admin";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
  rpc Update (UpdateDiskTypeRequest) returns (DiskType) {
    option (google.api.http) = { patch: "/compute/v1/diskTypes/{disk_type_id}" body: "*" };
    option (kacho.iam.authz.v1.permission)        = "compute.disk_types.update";
    option (kacho.iam.authz.v1.required_relation) = "system_admin";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
  rpc Delete (DeleteDiskTypeRequest) returns (DeleteDiskTypeResponse) {
    option (google.api.http) = { delete: "/compute/v1/diskTypes/{disk_type_id}" };
    option (kacho.iam.authz.v1.permission)        = "compute.disk_types.delete";
    option (kacho.iam.authz.v1.required_relation) = "system_admin";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message CreateDiskTypeRequest {
  // DiskType ID — admin задаёт явно (e.g. "network-ssd"). PrimaryKey, immutable.
  string id = 1;
  string description = 2;
  // Availability zones where this disk type is offered.
  repeated string zone_ids = 3;
}

message UpdateDiskTypeRequest {
  string disk_type_id = 1;
  string description = 2;
  repeated string zone_ids = 3;
}

message DeleteDiskTypeRequest { string disk_type_id = 1; }
message DeleteDiskTypeResponse {}
