version: v2
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
# Доменный proto kacho-compute генерируется здесь: kacho/cloud/compute/v1
# (Instance/Disk/Image/Snapshot/DiskType + Internal*-admin + instancegroup),
# kacho/cloud/access (AccessBinding-семейство для per-resource access-bindings) и
# kacho/cloud/maintenance/v2 (maintenance-окна). Универсальная ИНФРА
# (operation/validation/authz_options/cloud-api/google) живёт и генерируется в
# kacho-corelib и вендорится сюда ТОЛЬКО для buf-резолва импортов. Их go_package
# указывает на corelib (google — на canonical genproto), поэтому исключаем сами
# файлы из генерации — kacho-compute не владеет их Go-stub'ами и не дублирует их.
inputs:
  - directory: .
    paths:
      - kacho/cloud/compute/v1
      - kacho/cloud/access
      - kacho/cloud/maintenance/v2
