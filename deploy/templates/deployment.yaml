apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: kacho
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-migrator", "up"]
          env:
            - name: KACHO_COMPUTE_DB_HOST
              value: "{{ .Values.db.host }}"
            - name: KACHO_COMPUTE_DB_PORT
              value: "{{ .Values.db.port }}"
            - name: KACHO_COMPUTE_DB_USER
              value: "{{ .Values.db.user }}"
            - name: KACHO_COMPUTE_DB_NAME
              value: "{{ .Values.db.name }}"
            # SEC: migrator DB channel must be TLS too (same sslMode as serve).
            - name: KACHO_COMPUTE_DB_SSLMODE
              value: {{ .Values.db.sslMode | quote }}
            - name: KACHO_COMPUTE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-compute", "serve"]
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
            - name: grpc-internal
              containerPort: {{ .Values.ports.internalGrpc }}
          env:
            - name: KACHO_COMPUTE_DB_HOST
              value: "{{ .Values.db.host }}"
            - name: KACHO_COMPUTE_DB_PORT
              value: "{{ .Values.db.port }}"
            - name: KACHO_COMPUTE_DB_USER
              value: "{{ .Values.db.user }}"
            - name: KACHO_COMPUTE_DB_NAME
              value: "{{ .Values.db.name }}"
            - name: KACHO_COMPUTE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
            - name: KACHO_COMPUTE_GRPC_PORT
              value: "{{ .Values.ports.grpc }}"
            - name: KACHO_COMPUTE_INTERNAL_PORT
              value: "{{ .Values.ports.internalGrpc }}"
            # ─── SEC auth posture — arms fail-closed production gates ──────
            # cmd/compute/main.go::validateAuthMode + requireDBSSLMode +
            # requireTrustedForwarders + RequireIAM boot-gate. Chart defaults to
            # production (rules/security.md: every deploy is production-mode); a
            # dev stand overrides auth.mode=dev + mtls.enable=false + db.sslMode=disable.
            - name: KACHO_COMPUTE_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            - name: KACHO_COMPUTE_DB_SSLMODE
              value: {{ .Values.db.sslMode | quote }}
            - name: KACHO_COMPUTE_REQUIRE_IAM
              value: {{ .Values.auth.requireIAM | quote }}
            {{- with .Values.auth.trustedForwarderSANs }}
            - name: KACHO_COMPUTE_AUTHZ_TRUSTED_FORWARDER_SANS
              value: {{ . | quote }}
            {{- end }}
            # KAC-106 (E1): peer for project-existence switched to kacho-iam.
            - name: KACHO_COMPUTE_IAM_GRPC_ADDR
              value: "{{ .Values.iamAddr }}"
            {{- if .Values.mtls.enable }}
            {{- $srv := printf "%s/server" .Values.mtls.mountPath }}
            {{- $cli := printf "%s/client" .Values.mtls.mountPath }}
            # SEC-F mTLS server-creds (both listeners) — corelib grpcsrv.TLSServer
            # via config.LoadPrefixed("KACHO_COMPUTE"). ca.crt = client-CA bundle.
            - name: KACHO_COMPUTE_PUBLIC_SERVER_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_PUBLIC_SERVER_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $srv | quote }}
            - name: KACHO_COMPUTE_PUBLIC_SERVER_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $srv | quote }}
            - name: KACHO_COMPUTE_PUBLIC_SERVER_MTLS_CLIENTCAFILES
              value: {{ printf "%s/ca.crt" $srv | quote }}
            - name: KACHO_COMPUTE_INTERNAL_SERVER_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_INTERNAL_SERVER_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $srv | quote }}
            - name: KACHO_COMPUTE_INTERNAL_SERVER_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $srv | quote }}
            - name: KACHO_COMPUTE_INTERNAL_SERVER_MTLS_CLIENTCAFILES
              value: {{ printf "%s/ca.crt" $srv | quote }}
            {{- if .Values.mtls.edges.iamRegister }}
            # compute→iam (register-drainer) client-creds — grpcclient.TLSClient.
            - name: KACHO_COMPUTE_IAM_REGISTER_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_IAM_REGISTER_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_REGISTER_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_REGISTER_MTLS_CAFILES
              value: {{ printf "%s/ca.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_REGISTER_MTLS_SERVERNAME
              value: {{ .Values.mtls.serverName.iamRegister | quote }}
            {{- end }}
            {{- if .Values.mtls.edges.iamProject }}
            # SEC-I compute→iam ProjectService.Get (existence/leaf-owner, public
            # :9090) client-creds — grpcclient.TLSClient. ServerName=kacho-iam (∈ SAN).
            - name: KACHO_COMPUTE_IAM_PROJECT_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_IAM_PROJECT_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_PROJECT_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_PROJECT_MTLS_CAFILES
              value: {{ printf "%s/ca.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_PROJECT_MTLS_SERVERNAME
              value: {{ .Values.mtls.serverName.iamProject | quote }}
            {{- end }}
            {{- if .Values.mtls.edges.iamAuthz }}
            # SEC-I compute→iam Check + FGA-filtered List (internal :9091)
            # client-creds. ServerName=kacho-iam-internal (∈ SAN).
            - name: KACHO_COMPUTE_IAM_AUTHZ_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_IAM_AUTHZ_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_AUTHZ_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_AUTHZ_MTLS_CAFILES
              value: {{ printf "%s/ca.crt" $cli | quote }}
            - name: KACHO_COMPUTE_IAM_AUTHZ_MTLS_SERVERNAME
              value: {{ .Values.mtls.serverName.iamAuthz | quote }}
            {{- end }}
            {{- if .Values.mtls.edges.vpc }}
            # compute→vpc (NIC-spec validation + IPAM Address) client-creds.
            - name: KACHO_COMPUTE_VPC_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_VPC_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $cli | quote }}
            - name: KACHO_COMPUTE_VPC_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $cli | quote }}
            - name: KACHO_COMPUTE_VPC_MTLS_CAFILES
              value: {{ printf "%s/ca.crt" $cli | quote }}
            - name: KACHO_COMPUTE_VPC_MTLS_SERVERNAME
              value: {{ .Values.mtls.serverName.vpc | quote }}
            {{- end }}
            {{- if .Values.mtls.edges.geo }}
            # kacho-geo epic (Stage S4) — compute→geo (geo.v1.ZoneService.Get,
            # Instance.zone_id validation, public :9090) client-creds. Reuses the same
            # kacho-compute-client-tls SPIFFE cert as the vpc/iam edges (one client cert
            # per consumer, all edges). ServerName=kacho-geo (∈ geo server-cert SAN).
            - name: KACHO_COMPUTE_GEO_MTLS_ENABLE
              value: "true"
            - name: KACHO_COMPUTE_GEO_MTLS_CERTFILE
              value: {{ printf "%s/tls.crt" $cli | quote }}
            - name: KACHO_COMPUTE_GEO_MTLS_KEYFILE
              value: {{ printf "%s/tls.key" $cli | quote }}
            - name: KACHO_COMPUTE_GEO_MTLS_CAFILES
              value: {{ printf "%s/ca.crt" $cli | quote }}
            - name: KACHO_COMPUTE_GEO_MTLS_SERVERNAME
              value: {{ .Values.mtls.serverName.geo | quote }}
            {{- end }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # KAC-127: KACHO_COMPUTE_RESOURCE_MANAGER_GRPC_ADDR удалён — RM-fallback убран.
            - name: KACHO_COMPUTE_VPC_GRPC_ADDR
              value: "{{ .Values.vpcAddr }}"
            - name: KACHO_COMPUTE_VPC_INTERNAL_GRPC_ADDR
              value: "{{ .Values.vpcInternalAddr }}"
            # kacho-geo epic (Stage S4): compute→geo dial host (geo.v1.ZoneService.Get,
            # Instance.zone_id validation). config.go cfg.GeoGRPCAddr — public :9090.
            - name: KACHO_COMPUTE_GEO_GRPC_ADDR
              value: "{{ .Values.geoAddr }}"
            - name: KACHO_COMPUTE_SKIP_PEER_VALIDATION
              value: "{{ .Values.skipPeerValidation }}"
            # KAC-127 Phase 4 — FGA-filtered List + per-RPC authz endpoint.
            {{- with .Values.authzIam }}
            - name: KACHO_COMPUTE_AUTHZ_IAM_GRPC_ADDR
              value: "{{ .grpcAddr }}"
            - name: KACHO_COMPUTE_AUTHZ_IAM_TLS
              value: "{{ .tls }}"
            {{- end }}
            {{- with .Values.listFilter }}
            - name: KACHO_COMPUTE_LIST_FILTER_ENABLED
              value: "{{ .enabled }}"
            - name: KACHO_COMPUTE_LIST_FILTER_TIMEOUT_MS
              value: "{{ .timeoutMs }}"
            - name: KACHO_COMPUTE_LIST_FILTER_CACHE_TTL_MS
              value: "{{ .cacheTtlMs }}"
            - name: KACHO_COMPUTE_LIST_FILTER_CACHE_MAX_ENTRIES
              value: "{{ .cacheMaxEntries }}"
            - name: KACHO_COMPUTE_LIST_FILTER_FAIL_OPEN
              value: "{{ .failOpen }}"
            {{- end }}
            {{/* fgawrite — write-side OpenFGA tuple for new compute resources
                  (compute_instance|disk|image|snapshot) so FGA cascade
                  `viewer from project` has a path. Same shape as kacho-vpc
                  authz.tupleWrite. Disabled by default; umbrella values.dev.yaml
                  enables it + injects storeId/modelId from the OpenFGA
                  bootstrap-job-populated Secrets. */}}
            {{- if .Values.authz.tupleWrite.enabled }}
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_ENABLED
              value: "true"
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_OPENFGA_ENDPOINT
              value: "{{ .Values.authz.tupleWrite.openfgaEndpoint }}"
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_TIMEOUT_MS
              value: "{{ .Values.authz.tupleWrite.timeoutMs }}"
            {{- if .Values.authz.tupleWrite.storeIdSecretName }}
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_STORE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authz.tupleWrite.storeIdSecretName }}
                  key: {{ default "store_id" .Values.authz.tupleWrite.storeIdSecretKey }}
                  optional: true
            {{- else if .Values.authz.tupleWrite.storeId }}
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_STORE_ID
              value: "{{ .Values.authz.tupleWrite.storeId }}"
            {{- end }}
            {{- if .Values.authz.tupleWrite.modelIdSecretName }}
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authz.tupleWrite.modelIdSecretName }}
                  key: {{ default "model_id" .Values.authz.tupleWrite.modelIdSecretKey }}
                  optional: true
            {{- else if .Values.authz.tupleWrite.modelId }}
            - name: KACHO_COMPUTE_AUTHZ_TUPLE_WRITE_MODEL_ID
              value: "{{ .Values.authz.tupleWrite.modelId }}"
            {{- end }}
            {{- end }}
          {{- if .Values.mtls.enable }}
          volumeMounts:
            # SEC-F mTLS — cert-manager internal-CA server + client secrets in
            # separate dirs (req #5). cert-manager writes tls.crt/tls.key/ca.crt.
            - name: mtls-server
              mountPath: {{ printf "%s/server" .Values.mtls.mountPath | quote }}
              readOnly: true
            - name: mtls-client
              mountPath: {{ printf "%s/client" .Values.mtls.mountPath | quote }}
              readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
        # ==================================================================
        # KAC-127 Phase 4 — OPA sidecar for in-pod policy decisions.
        # ==================================================================
        # OPA pulls a signed bundle from kacho-iam (BundleService) every
        # 30–60s; bundle contains the FGA model + condition policies. The
        # sidecar is bound to 127.0.0.1 only — main container has loopback
        # access; nothing outside the pod can talk to it.
        {{- if .Values.opa.enabled }}
        - name: opa
          image: "{{ .Values.opa.image }}"
          imagePullPolicy: {{ .Values.opa.imagePullPolicy }}
          args:
            - "run"
            - "--server"
            - "--addr=127.0.0.1:{{ .Values.opa.port }}"
            - "--diagnostic-addr=0.0.0.0:8282"
            - "--config-file=/config/opa-config.yaml"
          ports:
            - name: opa-diag
              containerPort: 8282
          volumeMounts:
            - name: opa-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.opa.resources.requests.cpu }}
              memory: {{ .Values.opa.resources.requests.memory }}
            limits:
              cpu: {{ .Values.opa.resources.limits.cpu }}
              memory: {{ .Values.opa.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health?bundles
              port: opa-diag
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: opa-diag
            initialDelaySeconds: 10
            periodSeconds: 30
        {{- end }}
      {{- if or .Values.opa.enabled .Values.mtls.enable }}
      volumes:
        {{- if .Values.opa.enabled }}
        - name: opa-config
          configMap:
            name: {{ .Values.name }}-opa-config
        {{- end }}
        {{- if .Values.mtls.enable }}
        # SEC-F mTLS — cert-manager internal-CA secrets (server + client).
        - name: mtls-server
          secret:
            secretName: {{ .Values.mtls.serverSecretName | quote }}
        - name: mtls-client
          secret:
            secretName: {{ .Values.mtls.clientSecretName | quote }}
        {{- end }}
      {{- end }}
