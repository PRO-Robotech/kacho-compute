name: compute
replicas: 1
image: kacho-compute:dev
imagePullPolicy: IfNotPresent
ports:
  grpc: 9090
  internalGrpc: 9091
db:
  host: kacho-umbrella-pg-compute
  port: "5432"
  user: compute
  name: kacho_compute
  passwordSecretName: kacho-umbrella-pg-compute
  passwordSecretKey: password
  # sslMode — postgres sslmode for the DSN (migrator + serve). Any production
  # AuthMode fail-closed refuses boot unless this is require|verify-ca|verify-full
  # (config.go requireDBSSLMode): sslmode=disable ships the DB password + row data
  # as plaintext (CWE-319). Default `require` (TLS-on, works without a
  # pre-provisioned client CA); harden to verify-full where a root cert is mounted.
  # Set `disable` only on a dev stand running auth.mode=dev.
  sslMode: require

# ─── SEC auth posture (arms the binary's fail-closed production gates) ──
# auth.mode drives cmd/compute/main.go::validateAuthMode. rules/security.md:
# "любой деплой — production-mode". `production` rejects anonymous, requires
# server-mTLS on both listeners (⇒ mtls.enable=true below), a TLS DB channel
# (db.sslMode ∈ require|verify-ca|verify-full) and a non-empty trusted-forwarder
# allow-list. `production-strict` additionally demands per-edge client-mTLS on
# every live peer edge. `dev` is the only insecure mode (local stand only).
auth:
  mode: production
  # requireIAM — fail-closed boot-gate (KACHO_COMPUTE_REQUIRE_IAM): mutating
  # Create is refused (UNAVAILABLE) and readiness stays NotReady until the
  # register-drainer is IAM-connected, so no resource is ever created without a
  # deliverable owner-tuple intent. Production: true; dev back-compat: false.
  requireIAM: true
  # trustedForwarderSANs — comma-separated allow-list of client-cert SANs
  # permitted to forward the end-user principal (x-kacho-principal-*). MUST be
  # non-empty in any production mode (config.go requireTrustedForwarders): empty
  # ⇒ any mTLS peer is trusted to forward → confused-deputy / tenant crossing
  # (CWE-290/CWE-441). Default: the api-gateway SA SPIFFE id (the only legitimate
  # forwarder). Set empty only when auth.mode=dev.
  trustedForwarderSANs: "spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway"

iamAddr: "kacho-iam.kacho.svc.cluster.local:9090"
# KAC-127: resourceManagerAddr удалён — RM-fallback больше не поддерживается.
vpcAddr: "vpc.kacho.svc.cluster.local:9090"
# vpcInternalAddr — internal-порт kacho-vpc (:9091): InternalZoneService —
# compute берёт справочник зон из VPC-модуля (см. docs/architecture/07-known-divergences.md §6.1).
vpcInternalAddr: "vpc.kacho.svc.cluster.local:9091"
# geoAddr — kacho-geo public :9090 (geo.v1.ZoneService.Get): consumer-валидация
# Instance.zone_id (kacho-geo epic, Stage S4). config.go cfg.GeoGRPCAddr default-host.
geoAddr: "kacho-geo.kacho.svc.cluster.local:9090"
skipPeerValidation: "false"

# ─── SEC-F mTLS — per-edge opt-in (cert-manager internal-CA certs) ─────
# enable=false (default) → НИ cert-secret, НИ KACHO_COMPUTE_*_MTLS_* env →
# текущее insecure dev (нулевая регрессия, SEC-F-05). umbrella прокидывает
# .mtls.enable + per-edge флаги (КРИТ#3).
#
# При enable=true (corelib LoadPrefixed, SEC-D config/config.go):
#   server (оба listener'а): KACHO_COMPUTE_PUBLIC_SERVER_MTLS_* /
#                            KACHO_COMPUTE_INTERNAL_SERVER_MTLS_*
#   compute→iam (drainer):   KACHO_COMPUTE_IAM_REGISTER_MTLS_*
#   compute→iam (Project):   KACHO_COMPUTE_IAM_PROJECT_MTLS_*  (SEC-I, :9090)
#   compute→iam (authz):     KACHO_COMPUTE_IAM_AUTHZ_MTLS_*    (SEC-I, :9091 Check+list-filter)
#   compute→vpc (NIC/IPAM):  KACHO_COMPUTE_VPC_MTLS_*
#   compute→geo (zone_id):   KACHO_COMPUTE_GEO_MTLS_*          (kacho-geo epic S4, :9090 ZoneService.Get)
# serverName на dial-стороне = реальный dial-host (∈ server-SAN пира, КРИТ#1 / I6).
mtls:
  # enable=true (default): server-mTLS on both listeners — required by the default
  # auth.mode=production gate (insecureListenersInProduction). Flip to false ONLY
  # together with auth.mode=dev (local insecure stand). Per-edge client-mTLS
  # (.edges.*) stays independently opt-in for a staged rollout; auth.mode=
  # production-strict additionally requires those.
  enable: true
  # ─── internal-CA leaf-cert issuance (this chart owns its Certificate, rule #1) ─
  # client-cert URI-SAN saName MUST match the IAM module-SA seed (SEC-C migration
  # 0009): kacho-compute → sva(md5("kacho-compute")) holds fga_writer@iam_fgaproxy.
  issuer:
    name: kacho-internal-ca
    kind: ClusterIssuer   # ClusterIssuer (cluster-scoped), NOT namespaced Issuer
  serverHosts: ["compute"]          # server-cert DNS-SAN dial-host (Service = compute)
  spiffe:
    trustDomain: kacho.cloud
    namespace: kacho
    saName: kacho-compute
  leafDuration: 2160h
  leafRenewBefore: 720h
  serverSecretName: kacho-compute-server-tls   # cert key = kacho-compute (КРИТ#1)
  clientSecretName: kacho-compute-client-tls
  mountPath: /etc/kacho-compute/tls            # <mp>/server|client/{tls.crt,tls.key,ca.crt}
  edges:
    iamRegister: false   # compute→iam InternalIAMService.Register (drainer, :9091)
    iamProject: false    # compute→iam ProjectService.Get (existence/leaf-owner, :9090) — SEC-I
    iamAuthz: false      # compute→iam Check + FGA-filtered List (:9091) — SEC-I
    vpc: false           # compute→vpc NIC-spec + IPAM Address
    geo: false           # compute→geo ZoneService.Get (Instance.zone_id, :9090) — kacho-geo epic S4
  serverName:
    iamRegister: kacho-iam-internal.kacho.svc.cluster.local
    iamProject: kacho-iam.kacho.svc.cluster.local            # :9090 ProjectService.Get dial-host
    iamAuthz: kacho-iam-internal.kacho.svc.cluster.local     # :9091 Check/list-filter dial-host
    vpc: vpc.kacho.svc.cluster.local
    geo: kacho-geo.kacho.svc.cluster.local                   # :9090 ZoneService.Get dial-host

# compute is not on the Address.Create write-path; HPA + resources
# present for uniform policy across services. maxReplicas=5 is plenty.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ==========================================================================
# KAC-127 Phase 4 — FGA-filtered List integration
# ==========================================================================
# All keys map 1:1 to KACHO_COMPUTE_LIST_FILTER_* env vars on the main
# container. Disable by setting listFilter.enabled=false.
listFilter:
  enabled: true
  # Per-request deadline to iam.AuthorizeService.ListObjects (ms).
  timeoutMs: 500
  # In-memory decision cache TTL (ms). 5s — short enough so access-binding
  # revoke propagates in ≤5s.
  cacheTtlMs: 5000
  cacheMaxEntries: 10000
  # Degraded mode: on iam error → bypass filter (insecure; default false).
  failOpen: false

# authzIam — KAC-127 Phase 4 ListObjects + KAC-108 per-RPC Check both target
# the same kacho-iam internal listener.
authzIam:
  # gRPC address of kacho-iam internal port (AuthorizeService.{Check,ListObjects}).
  # Empty string ⇒ filter + per-RPC authz disabled (dev / breakglass).
  grpcAddr: "kacho-iam.kacho.svc.cluster.local:9091"
  tls: false

# ==========================================================================
# KAC-127 Phase 4 — OPA sidecar for in-pod policy decisions
# ==========================================================================
# OPA pulls a signed bundle from kacho-iam internal (:9091, BundleService).
# Bundle contains the FGA model + condition policies and is refreshed every
# `pollMinDelaySeconds`. Sidecar binds to 127.0.0.1:8181 — only the main
# container can reach it.
opa:
  enabled: false
  image: openpolicyagent/opa:1.4.2-rootless
  imagePullPolicy: IfNotPresent
  port: 8181
  # Bundle endpoint on kacho-iam (BundleService / signed-bundle pull).
  bundleService: "kacho-iam.kacho.svc.cluster.local"
  bundleHTTPSPort: "9443"
  bundleName: "compute-policy"
  pollMinDelaySeconds: 30
  pollMaxDelaySeconds: 60
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi


# KAC-198 follow-up: write-side FGA tuple for new compute resources
# (`compute_<resource>:<id>#project@project:<project_id>`) so per-resource
# Checks resolve via `viewer from project` cascade. Production: enabled=true
# with the shared OpenFGA store id (umbrella values.dev.yaml injects
# storeId/modelId from the OpenFGA bootstrap-job-populated Secrets).
authz:
  tupleWrite:
    enabled: false           # Toggle write-side FGA (production: true)
    openfgaEndpoint: ""      # OpenFGA HTTP API host:port (shared cluster store)
    storeId: ""              # OpenFGA store id (shared with kacho-iam)
    modelId: ""              # Pinned authorization_model_id (empty → store default)
    timeoutMs: 2000          # Per-call write timeout
    # Optional bootstrap-job-populated Secret refs (preferred over plain values
    # so kacho-iam's openfga-bootstrap-job stays single source of truth).
    storeIdSecretName: ""    # default: ""    e.g. kacho-iam-openfga-store
    storeIdSecretKey: ""     # default: "store_id"
    modelIdSecretName: ""    # default: ""    e.g. openfga-model-id-secret
    modelIdSecretKey: ""     # default: "model_id"
