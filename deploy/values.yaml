name: compute
replicas: 1
image: kacho-compute:dev
imagePullPolicy: IfNotPresent
ports:
  grpc: 9090
  internalGrpc: 9091
db:
  host: kacho-umbrella-pg-compute
  port: "5432"
  user: compute
  name: kacho_compute
  passwordSecretName: kacho-umbrella-pg-compute
  passwordSecretKey: password
iamAddr: "kacho-iam.kacho.svc.cluster.local:9090"
# KAC-127: resourceManagerAddr —É–¥–∞–ª—ë–Ω ‚Äî RM-fallback –±–æ–ª—å—à–µ –Ω–µ –ø–æ–¥–¥–µ—Ä–∂–∏–≤–∞–µ—Ç—Å—è.
vpcAddr: "vpc.kacho.svc.cluster.local:9090"
# vpcInternalAddr ‚Äî internal-–ø–æ—Ä—Ç kacho-vpc (:9091): InternalZoneService ‚Äî
# compute –±–µ—Ä—ë—Ç —Å–ø—Ä–∞–≤–æ—á–Ω–∏–∫ –∑–æ–Ω –∏–∑ VPC-–º–æ–¥—É–ª—è (—Å–º. docs/architecture/07-known-divergences.md ¬ß6.1).
vpcInternalAddr: "vpc.kacho.svc.cluster.local:9091"
# geoAddr ‚Äî kacho-geo public :9090 (geo.v1.ZoneService.Get): consumer-–≤–∞–ª–∏–¥–∞—Ü–∏—è
# Instance.zone_id (kacho-geo epic, Stage S4). config.go cfg.GeoGRPCAddr default-host.
geoAddr: "kacho-geo.kacho.svc.cluster.local:9090"
skipPeerValidation: "false"

# ‚îÄ‚îÄ‚îÄ SEC-F mTLS ‚Äî per-edge opt-in (cert-manager internal-CA certs) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# enable=false (default) ‚Üí –ù–ò cert-secret, –ù–ò KACHO_COMPUTE_*_MTLS_* env ‚Üí
# —Ç–µ–∫—É—â–µ–µ insecure dev (–Ω—É–ª–µ–≤–∞—è —Ä–µ–≥—Ä–µ—Å—Å–∏—è, SEC-F-05). umbrella –ø—Ä–æ–∫–∏–¥—ã–≤–∞–µ—Ç
# .mtls.enable + per-edge —Ñ–ª–∞–≥–∏ (–ö–Ý–ò–¢#3).
#
# –ü—Ä–∏ enable=true (corelib LoadPrefixed, SEC-D config/config.go):
#   server (–æ–±–∞ listener'–∞): KACHO_COMPUTE_PUBLIC_SERVER_MTLS_* /
#                            KACHO_COMPUTE_INTERNAL_SERVER_MTLS_*
#   compute‚Üíiam (drainer):   KACHO_COMPUTE_IAM_REGISTER_MTLS_*
#   compute‚Üíiam (Project):   KACHO_COMPUTE_IAM_PROJECT_MTLS_*  (SEC-I, :9090)
#   compute‚Üíiam (authz):     KACHO_COMPUTE_IAM_AUTHZ_MTLS_*    (SEC-I, :9091 Check+list-filter)
#   compute‚Üívpc (NIC/IPAM):  KACHO_COMPUTE_VPC_MTLS_*
#   compute‚Üígeo (zone_id):   KACHO_COMPUTE_GEO_MTLS_*          (kacho-geo epic S4, :9090 ZoneService.Get)
# serverName –Ω–∞ dial-—Å—Ç–æ—Ä–æ–Ω–µ = —Ä–µ–∞–ª—å–Ω—ã–π dial-host (‚àà server-SAN –ø–∏—Ä–∞, –ö–Ý–ò–¢#1 / I6).
mtls:
  enable: false
  # ‚îÄ‚îÄ‚îÄ internal-CA leaf-cert issuance (this chart owns its Certificate, rule #1) ‚îÄ
  # client-cert URI-SAN saName MUST match the IAM module-SA seed (SEC-C migration
  # 0009): kacho-compute ‚Üí sva(md5("kacho-compute")) holds fga_writer@iam_fgaproxy.
  issuer:
    name: kacho-internal-ca
    kind: ClusterIssuer   # ClusterIssuer (cluster-scoped), NOT namespaced Issuer
  serverHosts: ["compute"]          # server-cert DNS-SAN dial-host (Service = compute)
  spiffe:
    trustDomain: kacho.cloud
    namespace: kacho
    saName: kacho-compute
  leafDuration: 2160h
  leafRenewBefore: 720h
  serverSecretName: kacho-compute-server-tls   # cert key = kacho-compute (–ö–Ý–ò–¢#1)
  clientSecretName: kacho-compute-client-tls
  mountPath: /etc/kacho-compute/tls            # <mp>/server|client/{tls.crt,tls.key,ca.crt}
  edges:
    iamRegister: false   # compute‚Üíiam InternalIAMService.Register (drainer, :9091)
    iamProject: false    # compute‚Üíiam ProjectService.Get (existence/leaf-owner, :9090) ‚Äî SEC-I
    iamAuthz: false      # compute‚Üíiam Check + FGA-filtered List (:9091) ‚Äî SEC-I
    vpc: false           # compute‚Üívpc NIC-spec + IPAM Address
    geo: false           # compute‚Üígeo ZoneService.Get (Instance.zone_id, :9090) ‚Äî kacho-geo epic S4
  serverName:
    iamRegister: kacho-iam-internal.kacho.svc.cluster.local
    iamProject: kacho-iam.kacho.svc.cluster.local            # :9090 ProjectService.Get dial-host
    iamAuthz: kacho-iam-internal.kacho.svc.cluster.local     # :9091 Check/list-filter dial-host
    vpc: vpc.kacho.svc.cluster.local
    geo: kacho-geo.kacho.svc.cluster.local                   # :9090 ZoneService.Get dial-host

# compute is not on the Address.Create write-path; HPA + resources
# present for uniform policy across services. maxReplicas=5 is plenty.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ==========================================================================
# KAC-127 Phase 4 ‚Äî FGA-filtered List integration
# ==========================================================================
# All keys map 1:1 to KACHO_COMPUTE_LIST_FILTER_* env vars on the main
# container. Disable by setting listFilter.enabled=false.
listFilter:
  enabled: true
  # Per-request deadline to iam.AuthorizeService.ListObjects (ms).
  timeoutMs: 500
  # In-memory decision cache TTL (ms). 5s ‚Äî short enough so access-binding
  # revoke propagates in ‚â§5s.
  cacheTtlMs: 5000
  cacheMaxEntries: 10000
  # Degraded mode: on iam error ‚Üí bypass filter (insecure; default false).
  failOpen: false

# authzIam ‚Äî KAC-127 Phase 4 ListObjects + KAC-108 per-RPC Check both target
# the same kacho-iam internal listener.
authzIam:
  # gRPC address of kacho-iam internal port (AuthorizeService.{Check,ListObjects}).
  # Empty string ‚áí filter + per-RPC authz disabled (dev / breakglass).
  grpcAddr: "kacho-iam.kacho.svc.cluster.local:9091"
  tls: false

# ==========================================================================
# KAC-127 Phase 4 ‚Äî OPA sidecar for in-pod policy decisions
# ==========================================================================
# OPA pulls a signed bundle from kacho-iam internal (:9091, BundleService).
# Bundle contains the FGA model + condition policies and is refreshed every
# `pollMinDelaySeconds`. Sidecar binds to 127.0.0.1:8181 ‚Äî only the main
# container can reach it.
opa:
  enabled: false
  image: openpolicyagent/opa:1.4.2-rootless
  imagePullPolicy: IfNotPresent
  port: 8181
  # Bundle endpoint on kacho-iam (BundleService / signed-bundle pull).
  bundleService: "kacho-iam.kacho.svc.cluster.local"
  bundleHTTPSPort: "9443"
  bundleName: "compute-policy"
  pollMinDelaySeconds: 30
  pollMaxDelaySeconds: 60
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi


# KAC-198 follow-up: write-side FGA tuple for new compute resources
# (`compute_<resource>:<id>#project@project:<project_id>`) so per-resource
# Checks resolve via `viewer from project` cascade. Production: enabled=true
# with the shared OpenFGA store id (umbrella values.dev.yaml injects
# storeId/modelId from the OpenFGA bootstrap-job-populated Secrets).
authz:
  tupleWrite:
    enabled: false           # Toggle write-side FGA (production: true)
    openfgaEndpoint: ""      # OpenFGA HTTP API host:port (shared cluster store)
    storeId: ""              # OpenFGA store id (shared with kacho-iam)
    modelId: ""              # Pinned authorization_model_id (empty ‚Üí store default)
    timeoutMs: 2000          # Per-call write timeout
    # Optional bootstrap-job-populated Secret refs (preferred over plain values
    # so kacho-iam's openfga-bootstrap-job stays single source of truth).
    storeIdSecretName: ""    # default: ""    e.g. kacho-iam-openfga-store
    storeIdSecretKey: ""     # default: "store_id"
    modelIdSecretName: ""    # default: ""    e.g. openfga-model-id-secret
    modelIdSecretKey: ""     # default: "model_id"
